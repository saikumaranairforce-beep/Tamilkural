
<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK Digital AI | Kural API Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Madurai:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Hind Madurai', sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .api-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
            text-align: center;
            border-top: 8px solid #2563eb; /* Professional Blue Accent */
        }
        h1 { color: #1e3a8a; font-size: 1.2rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        #display { min-height: 150px; }
        .kural-line { font-size: 1.25rem; font-weight: bold; color: #1e293b; margin: 10px 0; line-height: 1.6; }
        .translation { font-size: 0.9rem; color: #64748b; font-style: italic; margin-top: 15px; }
        button {
            margin-top: 25px;
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>

    <div class="api-card">
        <h1>TamilKural API Test</h1>
        
        <div id="display">
            <p>குறள் ஏற்றப்படுகிறது...</p>
        </div>

        <button onclick="getKural()">அடுத்த குறள் (Next Random)</button>
        
        <p style="margin-top: 20px; font-size: 10px; color: #cbd5e1;">Powered by PK Digital AI Bridge</p>
    </div>

    <script>
        async function getKural() {
            const displayDiv = document.getElementById('display');
            try {
                // 1. Fetching your JSON from GitHub
                const response = await fetch('https://saikumaranairforce-beep.github.io/Tamilkural/kural-api.json');
                
                if (!response.ok) throw new Error("Could not find kural-api.json");
                
                const data = await response.json();

                // 2. Random Selection Logic
                const randomIndex = Math.floor(Math.random() * data.length);
                const kural = data[randomIndex];

                // 3. Updating the UI
                // Note: Ensure your JSON uses 'line1', 'line2', and 'trans'
                displayDiv.innerHTML = `
                    <div class="kural-line">${kural.Line1}</div>
                    <div class="kural-line">${kural.mv}</div>
                    <div class="translation">${kural.explanation}</div>
                `;
                
                console.log("Googd! API response handled.");
            } catch (error) {
                console.error("Error:", error);
                displayDiv.innerHTML = `<p style="color:red;">API Connection Error. Check console.</p>`;
            }
        }

        // Run once on load
        window.onload = getKural;
    </script>

</body>
</html>
